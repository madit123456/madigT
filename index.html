<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>madi present</title>
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Lilita One', 'Arial Black', sans-serif;
            user-select: none;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background: url("background.jpg") center/cover no-repeat fixed;
            color: #fff;
            overflow-x: hidden;
            padding-bottom: 120px;
            position: relative;
        }

        .text-outline {
            color: #ffffff;
            text-shadow: 
                3px 3px 0 #000, -3px -3px 0 #000, 
                3px -3px 0 #000, -3px 3px 0 #000,
                0px 4px 0 #000;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 30px;
            background: linear-gradient(to bottom, #5439df, #261779);
            border-bottom: 5px solid #000;
            box-shadow: 0 6px 0 rgba(0,0,0,0.3);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .user-block {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-avatar {
            width: 65px;
            height: 65px;
            background: #ffcc00;
            border: 4px solid #000;
            border-radius: 16px;
            box-shadow: 0 4px 0 #000;
            overflow: hidden;
        }

        .user-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .user-info {
            display: flex;
            flex-direction: column;
        }

        .username {
            font-size: 24px;
            letter-spacing: 0.5px;
        }

        .large-name {
            font-size: 32px;
        }

        .stats-badge {
            background: linear-gradient(to bottom, #ff9000, #d65100);
            border: 3px solid #000;
            border-radius: 20px;
            padding: 2px 14px;
            font-size: 15px;
            margin-top: 3px;
        }

        .wallet-panel {
            display: flex;
            background: #000000;
            border: 4px solid #000000;
            border-radius: 14px;
            padding: 2px 8px;
            align-items: center;
            gap: 12px;
            height: 48px;
        }

        .currency-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .currency-item img {
            width: 34px;
            height: 34px;
            object-fit: contain;
        }

        .currency-item span {
            font-size: 26px;
        }

        .menu-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
            margin: 35px auto 15px;
            max-width: 1100px;
            padding: 0 20px;
            position: relative;
            z-index: 10;
        }

        .btn-menu {
            background: linear-gradient(to bottom, #2b2b2b, #111111);
            border: 5px solid #000;
            border-radius: 22px;
            padding: 15px 55px;
            font-size: 28px;
            text-transform: uppercase;
            text-decoration: none;
            color: #fff;
            cursor: pointer;
            box-shadow: inset 0 6px 0 rgba(255,255,255,0.2), 0 10px 0 #000;
            transition: transform 0.1s, box-shadow 0.1s;
            height: 80px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
.btn-icon {
            width: 80px;
            height: 80px;
            padding: 0;
            background: linear-gradient(to bottom, #2b2b2b, #111111);
            border: 5px solid #000;
            border-radius: 22px;
            cursor: pointer;
            box-shadow: inset 0 6px 0 rgba(255,255,255,0.2), 0 10px 0 #000;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s, box-shadow 0.1s;
            text-decoration: none;
        }

        .btn-icon img {
            width: 65%;
            height: 65%;
            object-fit: contain;
            filter: drop-shadow(0 3px 0 rgba(0,0,0,0.5)) brightness(1.3);
        }

        .btn-menu:hover, .btn-icon:hover {
            filter: brightness(1.2);
        }

        .btn-menu:active, .btn-icon:active {
            transform: translateY(6px);
            box-shadow: inset 0 3px 0 rgba(255,255,255,0.1), 0 4px 0 #000;
        }

        .main-section {
            max-width: 1100px;
            margin: 40px auto;
            padding: 35px;
            background: linear-gradient(to bottom, rgba(58, 36, 172, 0.94), rgba(24, 13, 75, 0.94));
            border: 6px solid #000;
            border-radius: 32px;
            position: relative;
            z-index: 10;
            box-shadow: 
                0 0 35px rgba(0, 162, 255, 0.3),
                0 0 75px rgba(106, 0, 255, 0.25);
        }

        .section-title {
            font-size: 36px;
            text-transform: uppercase;
            margin-bottom: 30px;
        }

        .profile-card {
            display: flex;
            flex-direction: column;
            gap: 35px;
            background: linear-gradient(to bottom, #24144e, #130a2e);
            border: 5px solid #000;
            border-radius: 24px;
            padding: 30px;
            box-shadow: inset 0 0 25px rgba(0,0,0,0.65), 0 8px 0 #000;
            align-items: center;
        }

        .profile-header {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
        }

        .profile-avatar-large {
            width: 95px;
            height: 95px;
            background: #ff3c6a;
            border: 4px solid #000;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 5px 0 #000;
        }

        .profile-avatar-large img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-details {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .id-badge {
            background: #140f35;
            border: 4px solid #000;
            border-radius: 16px;
            padding: 8px 16px;
            font-size: 22px;
            letter-spacing: 1px;
            width: fit-content;
        }

        .profile-banner {
            width: 100%;
            max-width: 380px;
            border: 5px solid #000;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 6px 0 #000;
            background: #000;
        }

        .profile-banner img {
            width: 100%;
            height: auto;
            object-fit: cover;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 25px;
        }

        .grid-item {
            background: linear-gradient(to bottom, #3b1779, #1c0942);
            border: 5px solid #000;
            border-radius: 24px;
            padding: 20px;
            text-align: center;
            position: relative;
            box-shadow: 
                inset 0 4px 0 rgba(255,255,255,0.15),
                0 10px 0 #000;
            overflow: hidden;
            z-index: 10;
        }
.badge-discount {
            position: absolute;
            top: 15px;
            right: -12px;
            background: linear-gradient(to bottom, #ff0077, #9e0047);
            padding: 5px 16px;
            transform: skew(-12deg);
            font-size: 15px;
            border: 3px solid #000;
            box-shadow: 0 4px 0 rgba(0,0,0,0.3);
            z-index: 3;
        }

        .card-image-box {
            height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 15px 0;
            background: rgba(0, 0, 0, 0.3);
            border: 4px solid #000;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: inset 0 0 10px #000;
        }

        .card-image-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-title {
            font-size: 22px;
            text-transform: uppercase;
            margin-bottom: 12px;
            padding-right: 45px;
            text-align: left;
        }

        .btn-action {
            width: 100%;
            padding: 12px;
            background: linear-gradient(to bottom, #00ff51, #009c34);
            border: 4px solid #000;
            border-radius: 14px;
            font-size: 22px;
            cursor: pointer;
            box-shadow: 0 5px 0 #00551c, inset 0 3px 0 rgba(255,255,255,0.4);
            transition: 0.1s;
        }

        .btn-action.btn-free {
            background: linear-gradient(to bottom, #ffcc00, #ff9900);
            box-shadow: 0 5px 0 #b36b00, inset 0 3px 0 rgba(255,255,255,0.6);
        }

        .btn-action:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #00551c;
        }
        .btn-action.btn-free:active {
            box-shadow: 0 1px 0 #b36b00;
        }

        .action-zone {
            display: flex;
            justify-content: center;
            margin: 50px 0 30px;
            perspective: 800px;
            position: relative;
            z-index: 10;
        }

        .btn-main-action {
            width: 460px;
            height: 125px;
            background: linear-gradient(to bottom, #fff300 0%, #ffcc00 50%, #ff9900 51%, #ff7700 100%);
            border: 6px solid #000;
            border-radius: 24px;
            font-size: 75px;
            text-transform: uppercase;
            letter-spacing: -1px;
            cursor: pointer;
            transform: rotateX(8deg);
            filter: saturate(1.25);
            box-shadow: 
                0 16px 0 #6e0b00,
                0 16px 0 #000,
                0 0 40px rgba(255, 200, 0, 0.55),
                inset 0 7px 0 rgba(255,255,255,0.6);
            transition: 0.1s;
        }

        .btn-main-action:active {
            transform: rotateX(8deg) translateY(12px);
            box-shadow: 0 4px 0 #6e0b00, 0 4px 0 #000;
        }

        .footer-text {
            position: absolute;
            bottom: 25px;
            right: 20px;
            font-size: 18px;
            color: rgba(255, 255, 255, 0.7);
            z-index: 110;
        }

        /* --- MY ANIMATIONS --- */
        .my-animation-spin-720 { animation: myAnimSpin720 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        .my-animation-spin-360 { animation: myAnimSpin360 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        .my-animation-pulse { z-index: 999 !important; animation: myAnimPulse 1.5s ease-in-out forwards; }

        @keyframes myAnimSpin720 {
            0% { transform: scale(1) rotate(0deg); }
            100% { transform: scale(1) rotate(720deg); }
        }
        @keyframes myAnimSpin360 {
            0% { transform: scale(1) rotate(0deg); }
            100% { transform: scale(1) rotate(360deg); }
}
        @keyframes myAnimPulse {
            0%, 100% { transform: scale(1); }
            10% { transform: scale(1.5); }
            20% { transform: scale(0.6); }
            30% { transform: scale(1.5); }
            40% { transform: scale(0.6); }
            50% { transform: scale(1.5); }
            60% { transform: scale(0.6); }
            70% { transform: scale(1.5); }
            80% { transform: scale(0.6); }
            90% { transform: scale(1.5); }
        }

        @media (max-width: 768px) {
            .navbar { flex-direction: column; gap: 15px; padding: 15px; }
            .wallet-panel { height: auto; padding: 6px; }
            .menu-container { gap: 15px; margin: 25px auto 10px; }
            .btn-menu { padding: 12px 40px; font-size: 24px; height: 70px; }
            .btn-icon { width: 70px; height: 70px; }
            .btn-main-action { width: 90%; font-size: 50px; height: 100px; }
            .profile-header { flex-direction: column; text-align: center; }
            .profile-banner { max-width: 100%; }
            .footer-text { position: absolute; bottom: 15px; right: 15px; }
            .card-title { padding-right: 0; text-align: center; margin-top: 25px; }
        }
    </style>
</head>
<body>

    <header class="navbar">
        <div class="user-block">
            <div class="user-avatar">
                <img src="profile2.png" alt="Avatar">
            </div>
            <div class="user-info">
                <div class="username text-outline">⛩️|M'diツ|💋</div>
                <div class="stats-badge text-outline">🏆 109 081</div>
            </div>
        </div>

        <div class="wallet-panel">
            <div class="currency-item">
                <img src="bling.png" alt="Bling">
                <span class="text-outline">20264</span>
            </div>
            <div class="currency-item">
                <img src="coins.png" alt="Coins">
                <span class="text-outline">4226</span>
            </div>
            <div class="currency-item">
                <img src="gems.png" alt="Gems">
                <span class="text-outline">174</span>
            </div>
        </div>
    </header>

    <nav class="menu-container">
        <a href="#profile-section" class="btn-menu text-outline">Профиль</a>
        <a href="#shop-section" class="btn-icon">
            <img src="shop.png" alt="Shop">
        </a>
    </nav>

    <section id="profile-section" class="main-section">
        <h2 class="section-title text-outline">Профиль игрока</h2>
        <div class="profile-card">
            <div class="profile-header">
                <div class="profile-avatar-large">
                    <img src="brawlprofile.jpg" alt="Avatar Large">
                </div>
                <div class="profile-details">
                    <div class="username large-name text-outline">⛩️|M'diツ|💋</div>
                    <div class="id-badge text-outline">ID: AstMadi</div>
                </div>
            </div>
            <div class="profile-banner">
                <img src="profile1.png" alt="Banner">
            </div>
        </div>
    </section>

    <section id="shop-section" class="main-section">
        <h2 class="section-title text-outline">Shop</h2>
        
        <div class="grid-container">
            
            <div class="grid-item">
                <div class="badge-discount text-outline">АКЦИЯ 1%</div>
                <div class="card-title text-outline">🤣😭🥀</div>
                <div class="card-image-box">
                    <img src="meme1.jpg" alt="Meme 1">
                </div>
                <button class="btn-action text-outline" onclick="triggerEffect(this.closest('.grid-item'), 'spin-720')">💎 1488</button>
            </div>

            <div class="grid-item">
<div class="badge-discount text-outline">АКЦИЯ 67%</div>
                <div class="card-title text-outline">Хаха прикол</div>
                <div class="card-image-box">
                    <img src="meme2.jpg" alt="Meme 2">
                </div>
                <button class="btn-action text-outline" onclick="triggerEffect(this.closest('.grid-item'), 'spin-360')">💎 67</button>
            </div>

            <div class="grid-item">
                <div class="badge-discount text-outline">АКЦИЯ 100%</div>
                <div class="card-title text-outline">💀💀💀</div>
                <div class="card-image-box">
                    <img src="meme3.jpg" alt="Meme 3">
                </div>
                <button class="btn-action btn-free text-outline" onclick="triggerEffect(this.closest('.grid-item'), 'pulse')">FREE</button>
            </div>

        </div>
    </section>

    <div class="action-zone">
        <button class="btn-main-action text-outline">ИГРАТЬ</button>
    </div>

    <div class="footer-text text-outline">@Mad1iiiii_</div>

    <script>
        let animationActive = false;

        function triggerEffect(element, effectType) {
            if (animationActive || !element) return; 
            animationActive = true;

            if (effectType === 'spin-720') {
                element.classList.add('my-animation-spin-720');
                setTimeout(() => {
                    element.classList.remove('my-animation-spin-720');
                    animationActive = false;
                }, 800);

            } else if (effectType === 'spin-360') {
                element.classList.add('my-animation-spin-360');
                setTimeout(() => {
                    element.classList.remove('my-animation-spin-360');
                    animationActive = false;
                }, 600);

            } else if (effectType === 'pulse') {
                element.classList.add('my-animation-pulse');
                setTimeout(() => {
                    element.classList.remove('my-animation-pulse');
                    animationActive = false;
                }, 1500);
            }
        }
    </script>

</body>
</html>
